<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contraseña - EVO Payments</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="https://www.evopayments.com/wp-content/uploads/2020/10/EVO-LOGO_WHITE.svg" alt="EVO Payments" class="logo">
        <h1>Cambio de Contraseña Requerido</h1>
        <p>Por seguridad, debes cambiar tu contraseña temporal</p>
      </div>
      
      <form id="changePasswordForm" class="auth-form active">
        <div class="form-group">
          <label for="userName"><i class="fa-solid fa-user"></i> Usuario</label>
          <input type="text" id="userName" readonly style="background-color: #f1f5f9; cursor: not-allowed; color: #64748b;">
        </div>

        <div class="form-group">
          <label for="newPassword"><i class="fa-solid fa-lock"></i> Nueva Contraseña</label>
          <input type="password" id="newPassword" required placeholder="Ingresa tu nueva contraseña">
          <div class="password-requirements" style="margin-top: 12px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 0.85rem;">
            <p style="margin: 0 0 8px; font-weight: 600; color: #475569;"><i class="fa-solid fa-shield-halved"></i> Requisitos de seguridad:</p>
            <ul style="margin: 0; padding-left: 20px; list-style: none;">
              <li id="req-length" style="color: #94a3b8; margin: 4px 0;"><i class="fa-solid fa-circle" style="font-size: 0.5rem; margin-right: 8px;"></i>Mínimo 8 caracteres</li>
              <li id="req-upper" style="color: #94a3b8; margin: 4px 0;"><i class="fa-solid fa-circle" style="font-size: 0.5rem; margin-right: 8px;"></i>Una letra mayúscula</li>
              <li id="req-lower" style="color: #94a3b8; margin: 4px 0;"><i class="fa-solid fa-circle" style="font-size: 0.5rem; margin-right: 8px;"></i>Una letra minúscula</li>
              <li id="req-number" style="color: #94a3b8; margin: 4px 0;"><i class="fa-solid fa-circle" style="font-size: 0.5rem; margin-right: 8px;"></i>Un número</li>
              <li id="req-special" style="color: #94a3b8; margin: 4px 0;"><i class="fa-solid fa-circle" style="font-size: 0.5rem; margin-right: 8px;"></i>Un carácter especial (@$!%*?&)</li>
            </ul>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword"><i class="fa-solid fa-lock-open"></i> Confirmar Nueva Contraseña</label>
          <input type="password" id="confirmPassword" required placeholder="Confirma tu nueva contraseña">
        </div>

        <div id="errorMessage" class="message error" style="display: none; margin-bottom: 16px;"></div>

        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-key"></i> Cambiar Contraseña
        </button>
      </form>
    </div>
  </div>

  <script>
    // Obtener información del usuario desde sessionStorage
    const userInfo = JSON.parse(sessionStorage.getItem('changePasswordUser'));
    
    if (!userInfo || !userInfo.userId) {
      window.location.href = '/index.html';
    }

    document.getElementById('userName').value = `${userInfo.name} (${userInfo.email})`;

    // Validación en tiempo real de requisitos de contraseña
    document.getElementById('newPassword').addEventListener('input', (e) => {
      const password = e.target.value;
      
      // Marcar cada requisito como cumplido o no
      const reqLength = document.getElementById('req-length');
      const reqUpper = document.getElementById('req-upper');
      const reqLower = document.getElementById('req-lower');
      const reqNumber = document.getElementById('req-number');
      const reqSpecial = document.getElementById('req-special');
      
      if (password.length >= 8) {
        reqLength.style.color = '#10b981';
        reqLength.querySelector('i').className = 'fa-solid fa-check-circle';
      } else {
        reqLength.style.color = '#94a3b8';
        reqLength.querySelector('i').className = 'fa-solid fa-circle';
        reqLength.querySelector('i').style.fontSize = '0.5rem';
      }
      
      if (/[A-Z]/.test(password)) {
        reqUpper.style.color = '#10b981';
        reqUpper.querySelector('i').className = 'fa-solid fa-check-circle';
      } else {
        reqUpper.style.color = '#94a3b8';
        reqUpper.querySelector('i').className = 'fa-solid fa-circle';
        reqUpper.querySelector('i').style.fontSize = '0.5rem';
      }
      
      if (/[a-z]/.test(password)) {
        reqLower.style.color = '#10b981';
        reqLower.querySelector('i').className = 'fa-solid fa-check-circle';
      } else {
        reqLower.style.color = '#94a3b8';
        reqLower.querySelector('i').className = 'fa-solid fa-circle';
        reqLower.querySelector('i').style.fontSize = '0.5rem';
      }
      
      if (/\d/.test(password)) {
        reqNumber.style.color = '#10b981';
        reqNumber.querySelector('i').className = 'fa-solid fa-check-circle';
      } else {
        reqNumber.style.color = '#94a3b8';
        reqNumber.querySelector('i').className = 'fa-solid fa-circle';
        reqNumber.querySelector('i').style.fontSize = '0.5rem';
      }
      
      if (/[@$!%*?&]/.test(password)) {
        reqSpecial.style.color = '#10b981';
        reqSpecial.querySelector('i').className = 'fa-solid fa-check-circle';
      } else {
        reqSpecial.style.color = '#94a3b8';
        reqSpecial.querySelector('i').className = 'fa-solid fa-circle';
        reqSpecial.querySelector('i').style.fontSize = '0.5rem';
      }
    });

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('errorMessage');
      
      // Validar que las contraseñas coincidan
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Las contraseñas no coinciden';
        errorDiv.style.display = 'block';
        return;
      }
      
      // Validar formato de contraseña
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
      if (!passwordRegex.test(newPassword)) {
        errorDiv.textContent = 'La contraseña debe tener mínimo 8 caracteres, una mayúscula, una minúscula, un número y un caracter especial (@$!%*?&)';
        errorDiv.style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: userInfo.userId,
            newPassword
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error || 'Error al cambiar contraseña';
          errorDiv.style.display = 'block';
          return;
        }
        
        // Guardar usuario en localStorage y redirigir
        sessionStorage.removeItem('changePasswordUser');
        localStorage.setItem('currentUser', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (error) {
        errorDiv.textContent = 'Error de conexión. Intenta nuevamente.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
